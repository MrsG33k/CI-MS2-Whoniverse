<!DOCTYPE html>
<html lang="en" data-theme ="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where in the Whoniverse? | Start your Adventure</title>
    <!-- Importing the Orbitron and Roboto fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="main-header">
        <div class="logo-wrap">
            <img src="assets/images/TARDISpin.svg" alt="Where in the Whoniverse Logo" class="logo">
        </div>
        <h1>Where in the <span class="whoniverse-accent">Whoniverse?</span></h1>
    </header>

    <main class = "game-container">
        <section class = "map-section">
            <div id="game-map">
                <p class="map-loading">Initialising Space-Time Co-ordinates</p>
            </div>
            <button id="submit-guess" class="btn btn-secondary">Submit Guess</button>
        </section>

        <aside class="info-section">
            <div class="location-image-box">
                <img src="" alt="Mystery Doctor Who location" id="mystery-image">
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <h3>Score</h3>
                    <p id="current-score">0</p>
                </div>
                <div class ="stat-card">
                    <h3>Round</h3>
                    <p id="round-count">1 of 5</p>
                </div>
                <button id="hint-btn" class="btn btn-secondary">Hint?</button>
            </div>
        </aside>

    </main>

    <footer class ="landing-footer">
        <p>&copy; 2026 Where in the Whoniverse? All rights reserved.</p>
    </footer>
<!-- Link to Javascript file -->
    <script src="assets/js/game.js"></script>
</body>
</html>
